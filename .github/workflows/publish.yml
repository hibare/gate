name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  CHART_PATH: deployments/helm/gate
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_REGISTRY_PATH: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Load versions.env
        run: grep -E '^[A-Z_]+=' versions.env >> "$GITHUB_ENV"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GOLANG_DIGEST=${{ env.GOLANG_DIGEST }}
            DISTROLESS_DIGEST=${{ env.DISTROLESS_DIGEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-chart:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Set chart version
        env:
          VERSION: ${{ needs.build-image.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" "${{ env.CHART_PATH }}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "${{ env.CHART_PATH }}/Chart.yaml"

      - name: Package chart
        run: helm package "${{ env.CHART_PATH }}"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR
        run: helm push gate-${{ needs.build-image.outputs.version }}.tgz "oci://${{ env.CHART_REGISTRY_PATH }}"
