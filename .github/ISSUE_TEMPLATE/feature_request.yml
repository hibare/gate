name: Feature request
description: Propose a new capability or an enhancement to an existing one.
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an idea for GATE. For larger changes, please discuss
        first in [Discussions](https://github.com/thomsonreuters/gate/discussions)
        before opening this issue.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who is affected, and what is the current workaround?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you want to happen. Include API shape, configuration keys, or UX details where relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they fall short.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: true
      options:
        - Server / token exchange
        - OIDC validation
        - Authorizer / policy evaluation
        - Audit backends
        - Selector / rate limiting
        - GitHub client
        - Database / migrations
        - Telemetry / observability
        - Helm chart
        - Terraform modules
        - CLI / build tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: security
    attributes:
      label: Security implications
      description: Required if this touches authn/authz, OIDC, policy, token issuance, audit, or secrets. Otherwise write "N/A".
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, prior art, or RFC-style notes.
